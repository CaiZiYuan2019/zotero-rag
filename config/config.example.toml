[paths]
zotero_db = "<ZOTERO_DB_PATH>/zotero.sqlite"
zotero_storage = "<ZOTERO_STORAGE_PATH>/storage"
data_dir = "data"

[server]
host = "127.0.0.1"
port = 8765
require_api_token = true

[[embedding_profiles]]
name = "qwen3vl_cloud_2560_text"
provider = "dashscope"
model = "qwen3-vl-embedding"
dimension = 2560
modality = "text"
backend = "lancedb"
enabled = true
default_for_text = true
default_for_multimodal = false
batch_size = 16
query_role_mode = "instruction"
document_role_mode = "plain"
instruction_template = ""
image_policy = {}
rate_limit = {}

[[embedding_profiles]]
name = "qwen3vl_cloud_2560_multimodal"
provider = "dashscope"
model = "qwen3-vl-embedding"
dimension = 2560
modality = "multimodal"
backend = "lancedb"
enabled = true
default_for_text = false
default_for_multimodal = true
batch_size = 16
query_role_mode = "instruction"
document_role_mode = "plain"
instruction_template = ""
image_policy = {}
rate_limit = {}
